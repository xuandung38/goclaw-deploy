# GoClaw All-in-One — Managed mode (PostgreSQL + pgvector + Web Dashboard)
#
# Usage:
#   docker compose up -d
#
# Dashboard: http://localhost:3000
# API:       http://localhost:3000/v1/

services:
  goclaw:
    image: itsddvn/goclaw:v1.2.0-33-g7386fc8
    volumes:
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
      - goclaw-skills:/app/skills
      - goclaw-sessions:/app/sessions
      - goclaw-dotdir:/app/.goclaw
    env_file:
      - path: .env
        required: false
    environment:
      GOCLAW_CONFIG: /app/data/config.json
      GOCLAW_MODE: managed
      GOCLAW_POSTGRES_DSN: postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: ${POSTGRES_DB:-goclaw}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  goclaw-data:
  goclaw-workspace:
  goclaw-skills:
  goclaw-sessions:
  goclaw-dotdir:
  pgdata:
