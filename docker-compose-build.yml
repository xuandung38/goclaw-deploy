# GoClaw All-in-One — Local build mode (build from source)
#
# Prerequisites:
#   Clone goclaw source to ../goclaw (sibling directory)
#
# Usage:
#   docker compose -f docker-compose-build.yml up -d --build
#
# Dashboard: http://localhost:3000
# API:       http://localhost:3000/v1/

services:
  goclaw:
    platform: linux/amd64
    build:
      context: ../goclaw
      dockerfile: ${PWD}/Dockerfile
      additional_contexts:
        deploy: .
      args:
        VERSION: ${GOCLAW_VERSION:-dev}
    ports:
      - "${GOCLAW_UI_PORT:-3000}:8080"
    volumes:
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
      - goclaw-skills:/app/skills
      - goclaw-sessions:/app/sessions
      - goclaw-dotdir:/app/.goclaw
    env_file:
      - path: .env
        required: false
    environment:
      GOCLAW_CONFIG: /app/data/config.json
      GOCLAW_MODE: managed
      GOCLAW_POSTGRES_DSN: postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: ${POSTGRES_DB:-goclaw}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  goclaw-data:
  goclaw-workspace:
  goclaw-skills:
  goclaw-sessions:
  goclaw-dotdir:
  pgdata:
